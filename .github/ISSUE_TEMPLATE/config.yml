blank_issues_enabled: false
contact_links:
  - name: Suggest a source repo for the catalog
    url: https://github.com/lifebugz/ccpluginizer/blob/main/CONTRIBUTING.md
    about: Run `ccpluginizer scan owner/repo`, save the JSON to entries/<name>.json, and open a PR. See CONTRIBUTING.md for the full flow.
  - name: Request takedown of a listed entry
    url: https://github.com/lifebugz/ccpluginizer/blob/main/TAKEDOWN.md
    about: Source-repo authors who want their entry removed should follow the takedown process.
  - name: Report a security vulnerability
    url: https://github.com/lifebugz/ccpluginizer/security/advisories/new
    about: Use GitHub's private vulnerability reporting instead of a public issue.
