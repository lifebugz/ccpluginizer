name: validate

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Typecheck CLI
        run: bun run --filter '@ccpluginizer/ccpluginizer' typecheck
      - name: Lint CLI
        run: bun run --filter '@ccpluginizer/ccpluginizer' lint
      - name: Test CLI
        run: bun --filter='@ccpluginizer/ccpluginizer' test
      - name: Build CLI
        run: bun run --filter '@ccpluginizer/ccpluginizer' build
      - name: Build marketplace.json
        run: bun scripts/build-marketplace.ts
      - name: Validate each entry
        run: |
          for entry in entries/*.json; do
            bun run packages/cli/src/index.ts validate "$entry"
          done
      - name: Verify deps are at latest (strict-toolchain only)
        run: |
          cd packages/cli
          bun outdated --filter @typescript-eslint/* --filter eslint --filter typescript --filter valibot || true

  changeset-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Verify changeset present
        run: bunx changeset status --since=origin/${{ github.base_ref }}
