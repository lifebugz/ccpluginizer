name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Typecheck CLI
        run: bun --filter ccpluginizer run typecheck
      - name: Lint CLI
        run: bun --filter ccpluginizer run lint
      - name: Test CLI
        run: bun --filter ccpluginizer test
      - name: Build CLI
        run: bun --filter ccpluginizer run build
      - name: Build marketplace.json
        run: bun scripts/build-marketplace.ts
      - name: Validate each entry
        run: |
          for entry in entries/*.json; do
            bun run packages/cli/src/index.ts validate "$entry"
          done
      - name: Verify deps are at latest (strict-toolchain only)
        run: |
          cd packages/cli
          bun outdated --filter @typescript-eslint/* --filter eslint --filter typescript --filter valibot || true
