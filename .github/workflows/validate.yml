name: validate

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Typecheck CLI
        run: bun run --filter '@ccpluginizer/*' typecheck
      - name: Lint CLI
        run: bun run --filter '@ccpluginizer/*' lint
      - name: Test CLI
        run: bun --filter='@ccpluginizer/*' test
      - name: Build CLI
        run: bun run --filter '@ccpluginizer/*' build
      - name: Build marketplace.json
        run: bun scripts/build-marketplace.ts
      - name: Validate each entry
        run: |
          for entry in entries/*.json; do
            bun run packages/cli/src/index.ts validate "$entry"
          done
      - name: Verify deps are at latest (strict-toolchain only)
        run: |
          cd packages/cli
          bun outdated --filter @typescript-eslint/* --filter eslint --filter typescript --filter valibot || true

  # The jobs above run under Bun only. This job builds the CLI and exercises the
  # published artifact under plain Node, so an import-time `Bun.*` global (which
  # Bun-only CI would never catch) fails here instead of in a user's `npx` run.
  #
  # SCOPE: this only runs `validate`, the one command that imports neither
  # @crustjs/prompts nor @crustjs/style, so it cannot reach the *call-time* Bun
  # globals that exist today — Bun.stripANSI (via @crustjs/style `visibleWidth`,
  # reached by `scan`'s confirm() prompt) and Bun.color, both unguarded. Those
  # still crash `npx ccpluginizer scan` under Node and are NOT caught here; the
  # real fix is to guard them in @crustjs/style (cf. the guarded Bun.which).
  node-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, lts/*] # engines floor (>=20) + current LTS
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: bun install
      - name: Build CLI (bun build --target node)
        run: bun run --filter '@ccpluginizer/*' build
      - name: Smoke-test the built CLI under Node
        run: |
          node --version
          # Loads the whole bundled dist/ (catching import-time Bun globals) and
          # runs a real command end-to-end through the Node runtime.
          for entry in entries/*.json; do
            node packages/cli/dist/index.js validate "$entry"
          done

  changeset-check:
    if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Verify changeset present
        run: bunx changeset status --since=origin/${{ github.base_ref }}
