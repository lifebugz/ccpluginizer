name: release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write  # required for npm trusted publishing (OIDC) and provenance
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          # v3 deprecated the `app-id` input in favor of `client-id`. The App's
          # numeric ID is itself a valid JWT issuer (the action forwards either
          # input to octokit's `appId`), so we keep the existing secret value and
          # only switch the input name. (Secret still holds the numeric App ID.)
          client-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Quality gates
        run: |
          bun run --filter '@ccpluginizer/*' typecheck
          bun run --filter '@ccpluginizer/*' lint
          bun --filter='@ccpluginizer/*' test
          bun run --filter '@ccpluginizer/*' build

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: bun run ci:version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          publish: bun run ci:publish
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
