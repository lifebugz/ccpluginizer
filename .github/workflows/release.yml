name: release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify NPM_TOKEN secret is provisioned
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN repo secret is not set. Provision it before merging (see CONTRIBUTING.md)."
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Quality gates
        run: |
          bun run --filter '@ccpluginizer/*' typecheck
          bun run --filter '@ccpluginizer/*' lint
          bun --filter='@ccpluginizer/*' test
          bun run --filter '@ccpluginizer/*' build

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: bun run ci:version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          publish: bun run ci:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_TOKEN: changesets/action reads this and writes ~/.npmrc itself.
          # NPM_CONFIG_TOKEN: bun publish reads this directly per Bun docs.
          # Both ensure auth survives whichever code path actually does the publish.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
