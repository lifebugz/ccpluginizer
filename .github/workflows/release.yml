name: release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write  # required for npm trusted publishing (OIDC) and provenance
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'

      - name: Use npm >= 11.5.1 (OIDC trusted publishing minimum)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Quality gates
        run: |
          bun run --filter '@ccpluginizer/*' typecheck
          bun run --filter '@ccpluginizer/*' lint
          bun --filter='@ccpluginizer/*' test
          bun run --filter '@ccpluginizer/*' build

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: bun run ci:version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          publish: bun run ci:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
