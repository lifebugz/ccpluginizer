name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Only auto-review the repository OWNER's own code PRs. The action enforces a
    # write-access check internally; this if: additionally skips the job for
    # anyone else so no runner even starts (stops PR-open spam). Also skip:
    #   - drafts (work in progress)
    #   - bot/automation PRs (RELEASE_BOT, dependabot, etc.) via user.type
    #   - the changeset "version packages" release PR (changeset-release/*)
    #   - CI/chore housekeeping branches (ci/*, chore/*)
    if: >-
      github.event.pull_request.author_association == 'OWNER' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.type != 'Bot' &&
      !startsWith(github.head_ref, 'changeset-release/') &&
      !startsWith(github.head_ref, 'ci/') &&
      !startsWith(github.head_ref, 'chore/')

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # --comment is the master switch: without it the /code-review plugin reviews the PR
          # but its step 7 early-returns and posts nothing (a green check with no output).
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment'
          # The plugin's frontmatter already *permits* this tool, but in agent mode the action
          # only *boots* the bundled github_inline_comment MCP server when the tool is listed
          # here (install-mcp-server.ts gates on hasInlineCommentTools). Without it, the
          # "issues found" path posts inline comments to a server that was never started.
          # Posting is authorized by the OIDC-minted App token, so permissions: stays read-only.
          claude_args: '--allowedTools "mcp__github_inline_comment__create_inline_comment"'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

