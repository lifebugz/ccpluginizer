name: publish

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun scripts/build-marketplace.ts
      - name: Commit rebuilt marketplace.json if changed
        run: |
          if git diff --quiet -- .claude-plugin/marketplace.json; then
            echo "No marketplace changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .claude-plugin/marketplace.json
            git commit -m "chore: rebuild marketplace.json"
            git push
          fi
